<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Enquiry | BXhustleHub</title>

    <meta name="description" content="Enquire about services, products, sponsorship opportunities and volunteer programmes at BXhustleHub.">

    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>

    <div class="logo">
        <img src="images/logo.png" alt="BXhustleHub Logo">
        <p>Your Local Hustle Marketplace</p>
    </div>

    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="services.html">Services</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a href="enquiry.html">Enquiry</a></li>
        </ul>
    </nav>

</header>

<section class="enquiry-hero">
    <h2>Make an Enquiry</h2>
    <p>
        Interested in our services, products, volunteering opportunities,
        or sponsorship programmes? Complete the form below.
    </p>
</section>

<section class="enquiry-form-section">

<form id="enquiryForm">

<label for="name">Full Name</label>
<input type="text" id="name" placeholder="Enter your full name" required>

<label for="email">Email Address</label>
<input type="email" id="email" placeholder="Enter your email" required>

<label for="phone">Phone Number</label>
<input type="tel" id="phone" placeholder="Enter your phone number" required>

<label for="enquiryType">Enquiry Type</label>

<select id="enquiryType" required>

    <option value="">Select an option</option>

    <option value="service">Service Enquiry</option>
    <option value="product">Product Enquiry</option>
    <option value="volunteer">Become a Volunteer</option>
    <option value="sponsor">Become a Sponsor</option>

</select>

<label for="message">Your Message</label>

<textarea id="message" rows="5" placeholder="Type your enquiry here" required></textarea>

<button type="submit">Submit Enquiry</button>

</form>

</section>

<section>
    <div id="responseBox"></div>
</section>

<footer>
    <p>&copy; 2026 BXhustleHub</p>
    <p>Connecting local hustlers to the community.</p>
</footer>

<script>

const form = document.getElementById("enquiryForm");

form.addEventListener("submit", function(e){

    e.preventDefault();

    const enquiry = document.getElementById("enquiryType").value;
    const response = document.getElementById("responseBox");

    let output = "";

    if(enquiry === "service"){

        output = `
        <h3>Service Enquiry Submitted</h3>
        <p>
        Our local service providers are generally
        available within 24 to 48 hours.
        Service prices usually range from
        R100 to R1000 depending on the
        service requested.
        </p>`;
    }

    else if(enquiry === "product"){

        output = `
        <h3>Product Enquiry Submitted</h3>
        <p>
        Product availability depends on
        the vendor. Estimated prices vary
        according to stock and supplier.
        A representative will contact you
        shortly.
        </p>`;
    }

    else if(enquiry === "volunteer"){

        output = `
        <h3>Volunteer Application Received</h3>
        <p>
        Thank you for volunteering with
        BXhustleHub. Opportunities include
        community support, business promotion,
        and event assistance.
        </p>`;
    }

    else if(enquiry === "sponsor"){

        output = `
        <h3>Sponsorship Enquiry Received</h3>
        <p>
        Sponsorship packages begin at
        approximately R500 and can be
        customised according to your
        business goals and marketing needs.
        </p>`;
    }

    response.innerHTML = output;

    response.scrollIntoView({ behavior: "smooth" });

});

</script>

</body>
</html>
