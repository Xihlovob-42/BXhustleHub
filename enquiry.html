<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enquiry</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>Enquiry Form</h1>
</header>

<nav>
    <a href="index.html">Home</a>
    <a href="about.html">About Us</a>
    <a href="services.html">Services</a>
    <a href="contact.html">Contact</a>
</nav>

<section class="enquiry-hero">
    <h2>Send Us Your Enquiry</h2>
    <p>Fill in the form below and we will get back to you</p>
</section>

<section class="enquiry-form-section">

    <form>
        <label>Name:</label>
        <input type="text" placeholder="Enter your name" required>

        <label>Email:</label>
        <input type="email" placeholder="Enter your email" required>

        <label>Service Needed:</label>
        <select required>
            <option>Hair & Beauty</option>
            <option>Tutoring</option>
            <option>Car Wash</option>
            <option>Baking & Food</option>
        </select>

        <label>Message:</label>
        <textarea placeholder="Write your enquiry here" rows="5" required></textarea>

        <button type="submit">Send Enquiry</button>
    </form>

</section>

<footer>
    <p>&copy; 2026 BXhustleHub</p>
    <p>Connecting local hustlers to the community</p>
</footer>

</body>
</html>
